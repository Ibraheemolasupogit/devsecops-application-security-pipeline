title = "Genomic Research Access API Gitleaks Configuration"

[allowlist]
description = "Narrow allow-list for approved synthetic local JWT test key fixture only."
paths = [
  '''^tests/fixtures/keys/dev_private_key\.pem$''',
]

[[rules]]
id = "generic-api-token"
description = "Generic API token assignment"
regex = '''(?i)(api[_-]?token|secret[_-]?token|access[_-]?token)\s*[:=]\s*['"][A-Za-z0-9_\-]{20,}['"]'''
entropy = 3.5
keywords = ["api_token", "secret_token", "access_token"]

[[rules]]
id = "jwt-signing-material-outside-fixtures"
description = "JWT signing material outside approved fixtures"
regex = '''-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----'''
keywords = ["BEGIN", "PRIVATE KEY"]
