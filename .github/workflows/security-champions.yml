name: Security Champions

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: security-champions-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-champions:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # actions/setup-python v5.6.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip==25.1.1
          python -m pip install -e ".[dev]"

      - name: Champion configuration validation
        run: make champions-policy-validate

      - name: Champion metrics generation
        run: make champions-metrics

      - name: Champion evidence verification
        run: make champions-evidence verify-champions-evidence

      - name: Champion tests
        run: pytest tests/security/test_security_champions.py -q

      - name: Report verification
        run: make champions-report

      - name: Documentation validation
        run: make developer-docs-validate

      - name: Upload Security Champions artifacts
        # actions/upload-artifact v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: security-champions
          path: |
            outputs/security/champions/
            reports/security/champion-*.md
            reports/security/security-champions-report.md
          retention-days: 14
