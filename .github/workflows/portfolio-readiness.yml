name: Portfolio Readiness

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  portfolio-readiness:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip==25.1.1
          python -m pip install -e ".[dev]"
      - name: Portfolio validation
        run: |
          make quality
          make portfolio-full
          PYTHONPATH=src pytest tests/security/test_portfolio_readiness.py -q
          git diff --check
      - name: Upload portfolio artefacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: portfolio-readiness
          path: |
            outputs/security/portfolio/
            outputs/portfolio/
            reports/portfolio/
