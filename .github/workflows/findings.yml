name: Findings Normalisation

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: findings-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  findings:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # actions/setup-python v5.6.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip==25.1.1
          python -m pip install -e ".[dev]"

      - name: Source evidence verification
        run: make verify-threat-model-evidence verify-api-security-evidence verify-infrastructure-evidence verify-appsec-evidence verify-dynamic-evidence

      - name: Findings tests
        run: pytest tests/security/test_findings_pipeline.py -q

      - name: Findings normalisation and validation
        run: make findings-normalise findings-deduplicate findings-enrich findings-validate

      - name: Deterministic findings evidence
        run: make findings-evidence verify-findings-evidence

      - name: Findings reports
        run: make findings-report
