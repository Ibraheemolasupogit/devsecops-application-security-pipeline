name: Security Evidence

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: security-evidence-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evidence:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # actions/setup-python v5.6.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip==25.1.1
          python -m pip install -e ".[dev]"

      - name: Evidence tests
        run: pytest tests/security/test_consolidated_evidence.py -q

      - name: Source evidence verifiers
        run: make verify-threat-model-evidence verify-api-security-evidence verify-infrastructure-evidence verify-appsec-evidence verify-dynamic-evidence verify-findings-evidence verify-release-evidence verify-lifecycle-evidence

      - name: Consolidated evidence
        run: make evidence-full

      - name: Upload evidence artefacts
        uses: actions/upload-artifact@a8a3f3ad30e3422c9c7b888a15615d19a852ae32
        with:
          name: security-evidence
          path: |
            outputs/security/evidence/
            reports/security/*security*.md
            reports/security/*assurance*.md
            reports/security/*integrity*.md
          retention-days: 14
