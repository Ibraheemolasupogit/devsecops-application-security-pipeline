name: API Dynamic Security

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: api-dynamic-security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dynamic-api-security:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # actions/setup-python v5.6.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dynamic test dependencies
        run: |
          python -m pip install --upgrade pip==25.1.1
          python -m pip install -e ".[dev]"

      - name: Dynamic tool inventory
        run: make dynamic-tools

      - name: Dynamic pytest validation
        run: make dynamic-fast

      - name: Schemathesis local API validation
        run: make schemathesis-test

      - name: Print dynamic diagnostics on failure
        if: failure()
        run: make dynamic-diagnostics

      - name: Upload dynamic diagnostics
        if: always()
        # actions/upload-artifact v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dynamic-security-diagnostics
          path: |
            outputs/security/dynamic/raw/
            outputs/security/dynamic/*.json
            reports/security/dynamic-security-report.md
            reports/security/zap-report.md
          if-no-files-found: warn
          retention-days: 14

      - name: OWASP ZAP local baseline
        run: make zap-baseline

      - name: Dynamic evidence and reports
        run: make dynamic-evidence verify-dynamic-evidence dynamic-report
